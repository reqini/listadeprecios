[build]
  command = "npm run build"
  publish = "build"
  environment = { CI = "false" }

[[redirects]]
  from = "/api/*"
  to = "https://backend-catalogosimple.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "https://backend-catalogosimple.onrender.com/auth/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


